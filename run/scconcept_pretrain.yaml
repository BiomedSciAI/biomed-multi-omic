seed:
  seed_value: 1234

tokenizer:
  _target_: bmfm_targets.config.TokenizerConfig
  identifier: all_genes

fields:
- _target_: bmfm_targets.config.FieldInfo
  field_name: genes
- _target_: bmfm_targets.config.FieldInfo
  field_name: expressions
  tokenization_strategy: continuous_value_encoder
  encoder_kwargs:
    kind: mlp_with_special_token_embedding
    zero_as_special_token: true
  decode_modes:
    contrastive:
      projection_dim: 128
      learnable_scale: true
      decode_from: cls

label_columns: []

data_module:
  _target_: bmfm_targets.training.data_module.ContrastiveDataModule
  _partial_: true
  num_workers: 0
  mlm: false
  shuffle: true
  max_length: 64
  sequence_order: random
  switch_ratio: 0.0
  batch_size: ${n_cells_per_batch}
  limit_genes: protein_coding
  log_normalize_transform: false
  dataset_kwargs:
    processed_data_source: /Users/dmichael/github/biomed-multi-omic/data/real/pbmc3k.h5ad
  transform_datasets: false
  condition_columns:
    - celltype
  n_cells_per_batch: ${n_cells_per_batch}

model:
  _target_: bmfm_targets.config.SCBertConfig
  _partial_: true
  num_hidden_layers: 12
  num_attention_heads: 12
  intermediate_size: 3072
  hidden_act: gelu
  hidden_size: 768
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  initializer_range: 0.02
  layer_norm_eps: 1.0e-12
  pad_token_id: 0
  use_cache: true
  attention: torch
  checkpoint: ibm-research/biomed.rna.bert.110m.wced.multitask.v1

trainer:
  _target_: bmfm_targets.config.TrainerConfig
  warmup_steps: 10
  weight_decay: 0.01
  learning_rate: 1.0e-4
  betas:
    - 0.9
    - 0.99
  epsilon: 1.0e-8
  lr_decay_steps: null
  batch_prediction_behavior: null
  losses:
    - field_name: expressions
      name: contrastive
      weight: 1.0

task:
  _target_: bmfm_targets.config.TrainingTaskConfig
  default_root_dir: ${working_dir}
  max_epochs: ${max_epochs}
  precision: 32
  val_check_interval: null
  check_val_every_n_epoch: 1
  gradient_clip_val: 0.5
  accelerator: cpu
  max_steps: -1
  tf32_mode: null
  freeze_layers: false
  resume_training_from_ckpt: false
  checkpoints_every_n_train_steps: null
  limit_train_batches: ${limit_train_batches}
  limit_val_batches: 1
  num_sanity_val_steps: 0

working_dir: /tmp/scconcept_pretrain
max_epochs: 1
limit_train_batches: 10
n_cells_per_batch: 32
