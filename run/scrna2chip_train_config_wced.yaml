defaults:
  - data_module: scrna2chip
  - tokenizer: all_genes
  - fields: scrna2chip_wced
  - trainer: scrna2chip
  - task: train
  - model: scbert
  - _self_

seed:
  seed_value: 1234

model:
  checkpoint: ${checkpoint}

data_module:
  num_workers: 2
  # transform params:
  data_dir: ${my_data_dir}  # <---- remove if data is transformed
  processed_name: ${my_data_filename}_processed  # <---- remove if data is transformed
  transform_kwargs:
#    split_column_name: split_random  # tissue_split
    split_column_name: tissue_split  # tissue_split
    source_h5ad_file_name: ${my_data_filename}  # <---- remove if data is transformed
    transforms: []
  dataset_kwargs:
    new_field: label_expressions
    split_column_name: tissue_split
#    processed_data_source: ${input_file} # <---- relevant if inputting transformed data
  transform_datasets: true # <---- remove if data is transformed
#  transform_datasets: false # <---- relevant if inputting transformed data
  log_normalize_transform: false  # scRNA already in log in TS

  batch_size: 10 # 20
  max_length: 128 # 4096
  limit_genes: protein_coding # could be null, protein_coding, or tokenizer
  sequence_order: 'random'

  collation_strategy: multitask
  sequence_label_extractor:
    _target_: bmfm_targets.training.masking.strategy.WCEDMasker
    _partial_: true
    value_field_name: label_expressions
    sample_transforms_kwargs:
      log_normalize_transform: false
      median_normalization: false

trainer:
  learning_rate: 1.0e-5
  batch_prediction_behavior: "dump"
  losses:
    - field_name: label_expressions
      name: mse
      ignore_zero: false
      link_function: exp
      wced_target: all_genes
#    - field_name: label_expressions
#      name: is_zero_bce
#      wced_target: all_genes

label_columns: []

track_clearml:
 project_name: bmfm
 task_name: scRNA2Chip_WCED_train

working_dir: /tmp
accelerator: gpu
my_data_dir: null
my_data_filename: null
val_check_interval: 0.2 # 0.05
max_epochs: 5 #20
checkpoints_every_n_train_steps: 1000
checkpoint: null
input_file: null
