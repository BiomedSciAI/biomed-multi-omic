tokenizer:
  _target_: bmfm_targets.config.TokenizerConfig
  identifier: protein_coding
  prepend_tokens:
  - '[CLS]'
  - '[CLS_0]'
  - '[CLS_1]'
  - '[CLS_2]'
  - '[CLS_3]'
data_module:
  _target_: bmfm_targets.datasets.cellxgene.CellXGeneNexusDataModule
  _partial_: true
  num_workers: 8
  mlm: true
  collation_strategy: multitask
  shuffle: true
  max_length: 8192
  padding: longest
  sequence_order: random
  sequence_dropout_ratio: 0.2
  batch_size: 8
  limit_genes: protein_coding
  log_normalize_transform: true
  pad_zero_expression_strategy:
    strategy: batch_wise
    interleave_zero_ratio: 0.9
    expressed_sample_ratio: 0.2
  masking_strategy:
    _target_: bmfm_targets.training.masking.strategy.WCEDMasker
    _partial_: true
    sample_transforms_kwargs:
      median_normalization: false
      log_normalize_transform: true
  dataset_kwargs:
    uri: /proj/bmfm/omics/data/scRNA/cellxgene/2025-01-30/soma/
    index_dir: /proj/bmfm/omics/data/scRNA/cellxgene/2025-01-30/cellxgene_random_10pct_nexus_index/
    expose_zeros: all
    raw_counts: true
label_columns:
- _target_: bmfm_targets.config.LabelColumnInfo
  label_column_name: cell_type_ontology_term_id
  label_ontology: celltypeont
  decode_from: 1
- _target_: bmfm_targets.config.LabelColumnInfo
  label_column_name: tissue
  decode_from: 2
- _target_: bmfm_targets.config.LabelColumnInfo
  label_column_name: tissue_general
  decode_from: 2
- _target_: bmfm_targets.config.LabelColumnInfo
  label_column_name: donor_id
  decode_from: 3
- _target_: bmfm_targets.config.LabelColumnInfo
  label_column_name: sex
  decode_from: 4
fields:
- _target_: bmfm_targets.config.FieldInfo
  field_name: genes
- _target_: bmfm_targets.config.FieldInfo
  field_name: expressions
  is_masked: true
  tokenization_strategy: continuous_value_encoder
  encoder_kwargs:
    kind: scale_adapt
    n_sin_basis: 48
    basis_scale: 0.01
    trainable: false
    zero_as_special_token: true
  decode_modes:
    wced:
      vocab_field: genes
      logit_outputs:
      - mse
      - is_zero_bce
task:
  _target_: bmfm_targets.config.TrainingTaskConfig
  default_root_dir: ${oc.env:BMFM_TARGETS_TRAINING_DIR}/data
  max_epochs: 10
  limit_val_batches: 256
  precision: 16-mixed
  val_check_interval: 4000
  gradient_clip_val: 0.5
  accelerator: gpu
  max_steps: -1
  tf32_mode: medium
  accumulate_grad_batches: 2
  freeze_layers: false
  resume_training_from_ckpt: true
  checkpoints_every_n_train_steps: 10000
  strategy: ddp_find_unused_parameters_true
trainer:
  _target_: bmfm_targets.config.TrainerConfig
  warmup_steps: 1000
  weight_decay: 0.1
  learning_rate: 0.0001
  betas:
  - 0.9
  - 0.99
  epsilon: 1.0e-08
  lr_decay_steps: null
  losses:
  - label_column_name: cell_type_ontology_term_id
    weight: 1
    name: hce
  - label_column_name: tissue
    weight: 1
    name: focal
    focal_gamma: 2
  - label_column_name: tissue_general
    weight: 1
    name: focal
    focal_gamma: 2
  - label_column_name: donor_id
    name: focal
    focal_gamma: 2
  - label_column_name: sex
    name: cross_entropy
  - field_name: expressions
    name: mse
    ignore_zero: true
    wced_target: all_genes
  - field_name: expressions
    name: is_zero_bce
    wced_target: all_genes
  - field_name: expressions
    name: mse
    ignore_zero: true
    wced_target: input_genes
    weight: 0.0
  - field_name: expressions
    name: is_zero_bce
    wced_target: input_genes
    weight: 0.0
  - field_name: expressions
    name: mse
    ignore_zero: true
    wced_target: non_input_genes
    weight: 0.0
  - field_name: expressions
    name: is_zero_bce
    wced_target: non_input_genes
    weight: 0.0
model:
  _target_: bmfm_targets.models.predictive.llama.LlamaForMultiTaskConfig
  _partial_: true
  num_hidden_layers: 12
  num_attention_heads: 12
  hidden_act: gelu
  hidden_size: 384
  initializer_range: 0.02
  layer_norm_eps: 1.0e-12
  pad_token_id: 0
  flex_attention: true
  use_cache: true
  attention: flex
